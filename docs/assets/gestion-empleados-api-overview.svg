<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gestión de empleados Express API</title>
  <desc id="desc">Overview image for an Express and MongoDB REST API for employee management.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#052e16"/><stop offset="1" stop-color="#0f172a"/></linearGradient></defs>
  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <circle cx="1010" cy="135" r="210" fill="#22c55e" opacity="0.16"/>
  <circle cx="160" cy="615" r="250" fill="#38bdf8" opacity="0.11"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="82" y="112" fill="#ecfdf5" font-size="43" font-weight="900">Gestión de Empleados API</text>
    <text x="82" y="160" fill="#bbf7d0" font-size="23">Express REST API · MongoDB · SENA evidence</text>
    <rect x="82" y="225" width="1036" height="340" rx="30" fill="#ffffff" opacity="0.1" stroke="#86efac"/>
    <g transform="translate(132 292)"><rect width="190" height="130" rx="24" fill="#052e16" stroke="#22c55e"/><text x="34" y="55" fill="#dcfce7" font-size="23" font-weight="800">GET</text><text x="34" y="90" fill="#bbf7d0" font-size="16">/api/empleados</text></g>
    <g transform="translate(372 292)"><rect width="190" height="130" rx="24" fill="#052e16" stroke="#22c55e"/><text x="34" y="55" fill="#dcfce7" font-size="23" font-weight="800">POST</text><text x="34" y="90" fill="#bbf7d0" font-size="16">create employee</text></g>
    <g transform="translate(612 292)"><rect width="190" height="130" rx="24" fill="#052e16" stroke="#22c55e"/><text x="34" y="55" fill="#dcfce7" font-size="23" font-weight="800">PUT</text><text x="34" y="90" fill="#bbf7d0" font-size="16">update by id</text></g>
    <g transform="translate(852 292)"><rect width="190" height="130" rx="24" fill="#052e16" stroke="#22c55e"/><text x="34" y="55" fill="#dcfce7" font-size="23" font-weight="800">DELETE</text><text x="34" y="90" fill="#bbf7d0" font-size="16">remove by id</text></g>
    <text x="132" y="505" fill="#d1fae5" font-size="19">Runtime depends on local MongoDB at mongodb://localhost/empleados</text>
    <text x="82" y="650" fill="#bbf7d0" font-size="17">Local validation: dependencies install and Express starts on port 3000; CRUD responses require MongoDB running.</text>
  </g>
</svg>
